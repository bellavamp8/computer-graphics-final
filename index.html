<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CS 4731 Final Project Part I</title>
        <script id="vshader" type="x-shader/x-vertex">
            attribute vec4 vPosition;
attribute vec4 vNormal;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform vec4 lightPosition;

varying vec3 fN;
varying vec3 fL;
varying vec3 fV;

void main() {

    vec3 pos = (modelViewMatrix * vPosition).xyz;

    fN = normalize((modelViewMatrix * vNormal).xyz);
    fL = normalize(lightPosition.xyz - pos);
    fV = normalize(-pos);

    gl_Position = projectionMatrix * modelViewMatrix * vPosition;
}
        </script>

        <script id="fshader" type="x-shader/x-fragment">
            precision mediump float;

varying vec3 fN;
varying vec3 fL;
varying vec3 fV;

void main() {

    vec3 N = normalize(fN);
    vec3 L = normalize(fL);
    vec3 V = normalize(fV);
    vec3 R = reflect(-L, N);

    float diffuse = max(dot(L, N), 0.0);
    float specular = pow(max(dot(R, V), 0.0), 20.0);

    vec3 ambient = vec3(0.2, 0.2, 0.2);

    vec3 color = ambient + diffuse * vec3(0.6, 0.6, 1.0)
                 + specular * vec3(1.0);

    gl_FragColor = vec4(color, 1.0);
}
        </script>

        <script type="text/javascript" src="lib/webgl-utils.js"></script>
        <script type="text/javascript" src="lib/initShaders.js"></script>
        <script type="text/javascript" src="lib/MV.js"></script>

        <script type="text/javascript" src="lib/model.js"></script>
        <script type="text/javascript" src="lib/face.js"></script>
        <script type="text/javascript" src="main.js"></script>

    </head>

    <body onload="main()">
        <h1 id="mode">CS 4731 Final Project</h1>

        <canvas id="webgl" class="box" width="1600" height="900">
            Please use a browser that supports the "canvas" tag.
        </canvas>
    </body>
</html>
