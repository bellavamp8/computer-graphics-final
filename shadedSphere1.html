<!DOCTYPE html>
<html>

<script id="vertex-shader" type="x-shader/x-vertex">

attribute vec4 vPosition, vNormal;
attribute vec2 vTexCoord;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform mat4 lightMVP;  // Transform from world to light clip space

varying vec4 fColor;
varying vec2 fTexCoord;
varying vec3 fReflectDir;
varying vec4 fPosLightSpace;  // Position in light's clip space for shadow lookup

uniform vec4 lightDiffuse, lightSpecular, lightAmbient;
uniform vec4 materialDiffuse, materialSpecular, materialAmbient;
uniform float shininess;
uniform vec4 lightPosition;

void main()
{
    vec4 posMV = modelViewMatrix * vPosition;
    vec3 N = normalize(mat3(modelViewMatrix) * vNormal.xyz);
    vec3 L = normalize(lightPosition.xyz - posMV.xyz);
    vec3 V = normalize(-posMV.xyz);

    // Phong shading
    vec4 diffuse = lightDiffuse * materialDiffuse * max(dot(L,N),0.0);
    vec3 R = reflect(-L,N);
    vec4 specular = lightSpecular * materialSpecular * pow(max(dot(V,R),0.0), shininess);
    vec4 ambient = lightAmbient * materialAmbient;
    fColor = diffuse + specular + ambient;

    // Reflection vector
    fReflectDir = vec3(0.0);

    // Position in light clip space for shadow mapping
    fPosLightSpace = lightMVP * vPosition;

    fTexCoord = vTexCoord;
    gl_Position = projectionMatrix * posMV;
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
precision mediump float;

varying vec4 fColor;
varying vec2 fTexCoord;
varying vec3 fReflectDir;
varying vec4 fPosLightSpace;

uniform sampler2D tex0;
uniform sampler2D shadowMap;   // Depth texture from sun's POV
uniform bool useTexture;
uniform bool useReflection;
uniform bool receiveShadow;    // Only Earth receives the satellite shadow

float shadowFactor()
{
    // Convert from clip space [-1,1] to texture space [0,1]
    vec3 proj = (fPosLightSpace.xyz / fPosLightSpace.w) * 0.5 + 0.5;

    // Outside the shadow map frustum = no shadow
    if(proj.x < 0.0 || proj.x > 1.0 || proj.y < 0.0 || proj.y > 1.0) return 1.0;

    float closestDepth = texture2D(shadowMap, proj.xy).r;
    float currentDepth = proj.z;

    // Small bias to avoid shadow acne
    float bias = 0.005;
    return (currentDepth - bias > closestDepth) ? 0.4 : 1.0;
}

void main()
{
    vec4 baseColor = useTexture ? texture2D(tex0, fTexCoord) : vec4(1.0);
    float shadow = receiveShadow ? shadowFactor() : 1.0;
    gl_FragColor = vec4(fColor.rgb * baseColor.rgb * shadow, 1.0);
}
</script>

<!-- Depth-only pass vertex shader (renders scene from sun's POV) -->
<script id="depth-vertex-shader" type="x-shader/x-vertex">
attribute vec4 vPosition;
uniform mat4 lightMVP;
void main() {
    gl_Position = lightMVP * vPosition;
}
</script>

<!-- Depth-only pass fragment shader -->
<script id="depth-fragment-shader" type="x-shader/x-fragment">
precision mediump float;
void main() {
    gl_FragColor = vec4(gl_FragCoord.z, gl_FragCoord.z, gl_FragCoord.z, 1.0);
}
</script>
