<!DOCTYPE html>
<html>

<script id="vertex-shader" type="x-shader/x-vertex">

// assume both position and normal are in homogeneous form

attribute vec4 vPosition, vNormal;
attribute vec2 vTexCoord;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;

uniform vec4 lightDiffuse, lightSpecular, lightAmbient;
uniform vec4 materialDiffuse, materialSpecular, materialAmbient;
uniform float shininess;

uniform vec4 lightPosition;

varying vec4 fColor;
varying vec2 fTexCoord;

void main()
{
    vec4 nm = vNormal;
    nm.w = 1.0;

    vec3 pos = (modelViewMatrix * nm).xyz;
    vec3 L = normalize(lightPosition.xyz - pos);

    vec3 N = normalize((modelViewMatrix * vNormal).xyz);

    vec4 diffuse = lightDiffuse * materialDiffuse * max(dot(L,N),0.0);

    vec3 V = normalize(-pos);
    vec3 R = 2.0 * dot(L,N) * N - L;

    vec4 specular = lightSpecular * materialSpecular *
                    pow(max(dot(V,R),0.0), shininess);

    vec4 ambient = lightAmbient * materialAmbient;

    fColor = diffuse + specular + ambient;
    fColor.a = 1.0;

    fTexCoord = vTexCoord;

    gl_Position = projectionMatrix * modelViewMatrix * vPosition;
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
precision mediump float;

varying vec4 fColor;
varying vec2 fTexCoord;

uniform sampler2D tex0;
uniform bool useTexture;

void main()
{
    vec4 texColor = texture2D(tex0, fTexCoord);

    if(useTexture)
        gl_FragColor = fColor * texColor;
    else
        gl_FragColor = fColor;
}
</script>

<script type="text/javascript" src="lib/webgl-utils.js"></script>
<script type="text/javascript" src="lib/initShaders.js"></script>

</body>
</html>
